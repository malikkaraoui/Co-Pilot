services:
  - type: web
    name: okazcar-api
    runtime: docker
    plan: starter
    region: frankfurt
    healthCheckPath: /api/health
    disk:
      name: sqlite-data
      mountPath: /app/data
      sizeGB: 1
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_USERNAME
        value: malik
      - key: ADMIN_PASSWORD_HASH
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: WHEEL_SIZE_API_KEY
        sync: false
      - key: WHEEL_SIZE_DAILY_BUDGET
        value: "50"
      - key: LOG_LEVEL
        value: INFO
      - key: RENDER_DB_SYNC_URL
        sync: false
      - key: RENDER_DB_SYNC_METADATA_URL
        sync: false
      - key: RENDER_DB_SYNC_VERSION
        sync: false
      - key: RENDER_DB_SYNC_SHA256
        sync: false
      - key: RENDER_DB_SYNC_TIMEOUT
        value: "180"
