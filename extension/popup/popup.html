<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OKazCar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      width: 340px;
      background: #f8fafc;
      color: #1e293b;
      -webkit-font-smoothing: antialiased;
    }

    .popup-header {
      position: relative;
      padding: 22px 20px 18px;
      background: linear-gradient(135deg, #1e3a5f 0%, #1e40af 50%, #2563eb 100%);
      overflow: hidden;
    }

    .popup-header::before {
      content: '';
      position: absolute;
      top: -40%;
      right: -20%;
      width: 160px;
      height: 160px;
      background: radial-gradient(circle, rgba(255,255,255,0.08) 0%, transparent 70%);
      border-radius: 50%;
    }

    .popup-header-content {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .popup-logo-icon {
      width: 38px;
      height: 38px;
      flex-shrink: 0;
    }

    .popup-logo-text {
      display: flex;
      flex-direction: column;
    }

    .popup-logo {
      font-size: 20px;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: -0.3px;
      line-height: 1.1;
    }

    .popup-logo span {
      color: #fbbf24;
    }

    .popup-version {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.55);
      margin-top: 3px;
      font-weight: 400;
      letter-spacing: 0.2px;
    }

    .popup-body {
      padding: 18px 18px 14px;
    }

    .popup-status {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      background: #f0fdf4;
      border: 1px solid #bbf7d0;
      border-radius: 10px;
      margin-bottom: 16px;
    }

    .popup-status.error {
      background: #fef2f2;
      border-color: #fecaca;
    }

    .popup-status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #22c55e;
      flex-shrink: 0;
      box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.2);
      animation: popup-pulse 2s ease-in-out infinite;
    }

    @keyframes popup-pulse {
      0%, 100% { box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.2); }
      50% { box-shadow: 0 0 0 5px rgba(34, 197, 94, 0.1); }
    }

    .popup-status.error .popup-status-dot {
      background: #ef4444;
      box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.2);
      animation: none;
    }

    .popup-status-text {
      font-size: 12.5px;
      font-weight: 500;
      color: #166534;
    }

    .popup-status.error .popup-status-text {
      color: #991b1b;
    }

    .popup-analyze-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 13px 20px;
      margin-bottom: 16px;
      background: linear-gradient(135deg, #2563eb, #0ea5e9);
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 600;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.25s ease;
      box-shadow: 0 4px 14px rgba(37, 99, 235, 0.35), inset 0 1px 0 rgba(255,255,255,0.15);
      letter-spacing: 0.1px;
      position: relative;
      overflow: hidden;
    }

    .popup-analyze-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, transparent 40%, rgba(255,255,255,0.12) 100%);
      pointer-events: none;
    }

    .popup-analyze-btn:hover {
      background: linear-gradient(135deg, #1d4ed8, #0284c7);
      box-shadow: 0 6px 20px rgba(37, 99, 235, 0.45), inset 0 1px 0 rgba(255,255,255,0.15);
      transform: translateY(-1px);
    }

    .popup-analyze-btn:active {
      transform: translateY(0);
      box-shadow: 0 2px 8px rgba(37, 99, 235, 0.3);
    }

    .popup-analyze-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
      box-shadow: 0 2px 8px rgba(37, 99, 235, 0.15);
    }

    .popup-analyze-btn svg {
      flex-shrink: 0;
    }

    .popup-instructions {
      font-size: 12.5px;
      color: #64748b;
      line-height: 1.6;
    }

    .popup-instructions strong {
      color: #334155;
      font-weight: 600;
    }

    .popup-sites {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }

    .popup-site-badge {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 5px 10px;
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      font-size: 11px;
      font-weight: 600;
      color: #475569;
    }

    .popup-site-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .popup-site-dot.lbc { background: #ff6e14; }
    .popup-site-dot.as24 { background: #0061c9; }

    .popup-footer {
      padding: 10px 18px;
      border-top: 1px solid #e2e8f0;
      text-align: center;
      background: #fff;
    }

    .popup-footer span {
      font-size: 11px;
      color: #94a3b8;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="popup-header">
    <div class="popup-header-content">
      <svg class="popup-logo-icon" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
        <circle cx="64" cy="64" r="56" fill="none" stroke="rgba(255,255,255,0.85)" stroke-width="12"/>
        <circle cx="64" cy="64" r="12" fill="rgba(255,255,255,0.85)"/>
        <g stroke="rgba(255,255,255,0.85)" stroke-width="8" stroke-linecap="round">
          <line x1="64" y1="22" x2="64" y2="52"/>
          <line x1="64" y1="22" x2="64" y2="52" transform="rotate(72 64 64)"/>
          <line x1="64" y1="22" x2="64" y2="52" transform="rotate(144 64 64)"/>
          <line x1="64" y1="22" x2="64" y2="52" transform="rotate(216 64 64)"/>
          <line x1="64" y1="22" x2="64" y2="52" transform="rotate(288 64 64)"/>
        </g>
      </svg>
      <div class="popup-logo-text">
        <div class="popup-logo">OKaz<span>Car</span></div>
        <div class="popup-version">Analyse annonce auto de A &agrave; Z</div>
      </div>
    </div>
  </div>

  <div class="popup-body">
    <div class="popup-status" id="popup-status">
      <div class="popup-status-dot"></div>
      <span class="popup-status-text" id="popup-status-text">Extension active</span>
    </div>

    <button class="popup-analyze-btn" id="analyze-btn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/>
        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      Analyser cette annonce
    </button>

    <div class="popup-instructions">
      <p>Ouvrez une annonce puis lancez l'analyse.</p>
      <div class="popup-sites">
        <div class="popup-site-badge"><span class="popup-site-dot lbc"></span>leboncoin.fr</div>
        <div class="popup-site-badge"><span class="popup-site-dot as24"></span>autoscout24</div>
      </div>
    </div>
  </div>

  <div class="popup-footer">
    <span>v1.0.0</span>
  </div>

  <script src="popup.js"></script>
</body>
</html>
