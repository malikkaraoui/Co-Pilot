<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Rounded square background -->
  <rect width="128" height="128" rx="24" fill="#1e40af"/>
  <!-- Tire -->
  <circle cx="64" cy="64" r="42" fill="none" stroke="#ffffff" stroke-width="9"/>
  <!-- Hub -->
  <circle cx="64" cy="64" r="9" fill="#ffffff"/>
  <!-- 5 Spokes -->
  <g stroke="#ffffff" stroke-width="6" stroke-linecap="round">
    <line x1="64" y1="31" x2="64" y2="55"/>
    <line x1="64" y1="31" x2="64" y2="55" transform="rotate(72 64 64)"/>
    <line x1="64" y1="31" x2="64" y2="55" transform="rotate(144 64 64)"/>
    <line x1="64" y1="31" x2="64" y2="55" transform="rotate(216 64 64)"/>
    <line x1="64" y1="31" x2="64" y2="55" transform="rotate(288 64 64)"/>
  </g>
</svg>
