<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>OKazCar Small Promo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700;9..40,800&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 440px;
  height: 280px;
  font-family: 'DM Sans', sans-serif;
  overflow: hidden;
  background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 40%, #1e40af 100%);
  position: relative;
}

/* Subtle grid pattern */
body::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
}

/* Glow orb */
.glow {
  position: absolute;
  width: 200px;
  height: 200px;
  background: radial-gradient(circle, rgba(59,130,246,0.3) 0%, transparent 70%);
  border-radius: 50%;
  top: -60px;
  right: -40px;
}
.glow2 {
  position: absolute;
  width: 160px;
  height: 160px;
  background: radial-gradient(circle, rgba(251,191,36,0.15) 0%, transparent 70%);
  border-radius: 50%;
  bottom: -40px;
  left: 20px;
}

.content {
  position: relative;
  z-index: 1;
  height: 100%;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 32px 36px;
}

.logo-row {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 18px;
}
.logo-wheel { width: 44px; height: 44px; flex-shrink: 0; }
.logo-name {
  font-size: 28px;
  font-weight: 800;
  color: #fff;
  letter-spacing: -0.5px;
}
.logo-name em { color: #fbbf24; font-style: normal; }

.tagline {
  font-size: 16px;
  font-weight: 500;
  color: rgba(255,255,255,0.8);
  line-height: 1.4;
  margin-bottom: 22px;
  max-width: 300px;
}

.features {
  display: flex;
  gap: 10px;
}
.feature {
  padding: 6px 14px;
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 20px;
  font-size: 11px;
  font-weight: 600;
  color: #fff;
  backdrop-filter: blur(4px);
  display: flex;
  align-items: center;
  gap: 5px;
}
.feature .dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: #22c55e;
}

/* Sites supported */
.sites {
  position: absolute;
  bottom: 20px;
  right: 28px;
  display: flex;
  gap: 8px;
  align-items: center;
}
.site-pill {
  padding: 4px 10px;
  background: rgba(255,255,255,0.08);
  border-radius: 12px;
  font-size: 10px;
  color: rgba(255,255,255,0.5);
  font-weight: 500;
}
</style>
</head>
<body>
<div class="glow"></div>
<div class="glow2"></div>

<div class="content">
  <div class="logo-row">
    <svg class="logo-wheel" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
      <circle cx="64" cy="64" r="56" fill="none" stroke="#ffffff" stroke-width="12"/>
      <circle cx="64" cy="64" r="12" fill="#ffffff"/>
      <g stroke="#ffffff" stroke-width="8" stroke-linecap="round">
        <line x1="64" y1="22" x2="64" y2="52"/>
        <line x1="64" y1="22" x2="64" y2="52" transform="rotate(72 64 64)"/>
        <line x1="64" y1="22" x2="64" y2="52" transform="rotate(144 64 64)"/>
        <line x1="64" y1="22" x2="64" y2="52" transform="rotate(216 64 64)"/>
        <line x1="64" y1="22" x2="64" y2="52" transform="rotate(288 64 64)"/>
      </g>
    </svg>
    <div class="logo-name">OKaz<em>Car</em></div>
  </div>

  <div class="tagline">Analysez vos annonces auto en 1 clic.<br>Score, prix, anomalies.</div>

  <div class="features">
    <div class="feature"><span class="dot"></span>9 filtres</div>
    <div class="feature"><span class="dot"></span>Score fiabilite</div>
    <div class="feature"><span class="dot"></span>Gratuit</div>
  </div>
</div>

<div class="sites">
  <div class="site-pill">leboncoin.fr</div>
  <div class="site-pill">autoscout24</div>
</div>

</body>
</html>
